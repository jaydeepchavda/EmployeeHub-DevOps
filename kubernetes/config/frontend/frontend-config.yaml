apiVersion: v1
kind: ConfigMap

metadata:
  name: rhwalks-ui-config
  namespace: rhwalks-dev

  labels:
    app: rhwalks-ui
    environment: development
    managed-by: kubernetes

data:

  APP_NAME: "RHWalks"

  APP_ENVIRONMENT: "Development"

  API_BASE_URL: "http://rhwalks-api-service:8080"

  LOG_LEVEL: "Information"

  ENABLE_ANALYTICS: "false"

  ENABLE_DEBUG: "true"

  DEFAULT_LANGUAGE: "en"
  
  API_REQUEST_TIMEOUT: "30"

  APP_VERSION: "1.0.0"