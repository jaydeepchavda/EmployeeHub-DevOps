apiVersion: apps/v1
kind: Deployment

metadata:
  name: rhwalks-api
  namespace: rhwalks-dev

spec:
  replicas: 2

  selector:
    matchLabels:
      app: rhwalks-api

  template:
    metadata:
      labels:
        app: rhwalks-api

    spec:
      containers:
        - name: rhwalks-api

          image: jaydeepchavda/rhwalks-api:v1

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080


          env:
          - name: ASPNETCORE_ENVIRONMENT
            valueFrom:
              configMapKeyRef:
                name: rhwalks-api-config
                key: ASPNETCORE_ENVIRONMENT

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 8080

            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 8080

            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3