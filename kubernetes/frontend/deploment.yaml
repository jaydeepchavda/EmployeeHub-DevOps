apiVersion: apps/v1
kind: Deployment

metadata:
  name: rhwalks-ui
  namespace: rhwalks-dev

spec:
  replicas: 2

  selector:
    matchLabels:
      app: rhwalks-ui

  template:
    metadata:
      labels:
        app: rhwalks-ui

    spec:
      containers:
      - name: rhwalks-ui
        image: jaydeepchavda/rhwalks-ui:v1

        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 80

        env:
        - name: APP_NAME
          valueFrom:
            configMapKeyRef:
              name: rhwalks-ui-config
              key: APP_NAME

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits: 
            cpu: "500m"
            memory: "512Mi"
